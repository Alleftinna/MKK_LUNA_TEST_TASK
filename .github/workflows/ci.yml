name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30
    env:
      APP_NAME: app
      DEBUG: "0"
      COMPOSE_PROFILES: ci
      HOST_PORT: "8000"
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: postgres
      DB_HOST: localhost
      DB_PORT: "5432"
      DATABASE_ECHO: "0"
      TEST_DB_NAME: test_db
      TEST_DB_USER: postgres
      TEST_DB_PASS: postgres
      TEST_DB_HOST: localhost
      TEST_DB_PORT: "5432"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Ruff
        run: uv run ruff check src tests

      - name: MyPy
        run: uv run mypy src tests

      - name: Pytest
        run: uv run pytest --cov=src --cov-report=term-missing

      - name: Alembic scripts check
        run: uv run alembic heads
