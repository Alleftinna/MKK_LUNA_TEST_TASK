<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Админ-панель шаблона{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    :root {
      --background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 50%, #e2e8f0 100%);
      --card: rgba(255, 255, 255, 0.8);
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --border: rgba(148, 163, 184, 0.2);
      --muted: #f1f5f9;
      --muted-foreground: #64748b;
      --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      --shadow-glow: 0 0 20px rgba(59, 130, 246, 0.15);
    }
    body { background: var(--background); font-family: system-ui, -apple-system, sans-serif; }
    .glass { background: var(--card); backdrop-filter: blur(16px) saturate(180%); border: 1px solid var(--border); }
    .hover-lift { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .hover-lift:hover { transform: translateY(-2px); box-shadow: var(--shadow-xl); }
  </style>
</head>
<body class="min-h-screen">
<div class="flex h-screen">
  <aside class="w-64 glass border-r backdrop-blur-xl" style="border-color: var(--border);">
    <div class="p-6 border-b" style="border-color: var(--border);">
      <div class="flex items-center gap-3 mb-2">
        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-blue-700 flex items-center justify-center" style="box-shadow: var(--shadow-glow);">
          <i data-lucide="folder-tree" class="w-4 h-4 text-white"></i>
        </div>
        <div>
          <h1 class="text-xl font-semibold bg-gradient-to-r from-gray-900 to-gray-600 bg-clip-text text-transparent">
            Админ-панель шаблона
          </h1>
        </div>
      </div>
      <p class="text-sm text-gray-600">Управление базовыми сущностями проекта</p>
    </div>
    <nav class="px-4 py-6 space-y-2 text-sm">
      <a href="/api/v1/admin/ui"
         class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-gray-100 transition-all">
        <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
        <span class="font-medium">Дашборд</span>
      </a>
      <a href="/api/v1/admin/ui/template-entities"
         class="w-full flex items-center gap-3 px-4 py-2 rounded-xl hover:bg-gray-100 transition-all">
        <i data-lucide="database" class="w-4 h-4"></i>
        <span class="font-medium">Базовые сущности</span>
      </a>
    </nav>
  </aside>
  <main class="flex-1 overflow-hidden">
    <div class="h-full overflow-y-auto p-8">
      <div id="user_header" class="flex items-center justify-between mb-6 min-h-[52px]">
        <div class="flex items-center gap-3 min-w-0 flex-1">
          <div class="w-8 h-8 shrink-0 rounded-lg bg-gradient-to-br from-blue-100 to-blue-50 flex items-center justify-center">
            <i data-lucide="user" class="w-4 h-4 text-blue-700"></i>
          </div>
          <div class="text-sm text-gray-600 min-h-[1.375rem] flex flex-wrap items-center gap-x-2 gap-y-1">
            <span>Шаблонная админ-панель</span>
            <span id="uh_name" class="font-medium text-gray-900">Template Admin</span>
          </div>
        </div>
      </div>
      {% block content %}{% endblock %}
    </div>
  </main>
</div>

<script>
  if (typeof lucide !== 'undefined') { lucide.createIcons(); }

  async function api(method, url, data) {
    const res = await fetch(url, {
      method,
      headers: { 'Content-Type': 'application/json' },
      body: data ? JSON.stringify(data) : undefined,
    });
    if (!res.ok) {
      const text = await res.text();
      throw new Error(text || (res.status + ' ' + res.statusText));
    }
    const ct = res.headers.get('content-type') || '';
    return ct.includes('application/json') ? res.json() : res.text();
  }

</script>
{% block scripts %}{% endblock %}
</body>
</html>
