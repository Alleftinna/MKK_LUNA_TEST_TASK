<!DOCTYPE html>
<html lang="en" class="h-100">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{settings.APP_NAME} API</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --vscode-bg: #1e1e1e;
            --vscode-darker: #1a1a1a;
            --vscode-lighter: #252526;
            --vscode-highlight: #2d2d2d;
            --vscode-text: #d4d4d4;
            --vscode-accent: #007acc;
            --vscode-border: #404040;
        }

        body {
            background-color: var(--vscode-bg);
            color: var(--vscode-text);
        }

        main {
            min-height: calc(100vh - 136px);
        }

        .navbar {
            background-color: var(--vscode-darker) !important;
            border-bottom: 1px solid var(--vscode-border);
        }

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 500;
            color: var(--vscode-text) !important;
        }

        .navbar-toggler {
            border-color: var(--vscode-border);
        }

        .navbar-toggler-icon {
            filter: invert(0.8);
        }

        .nav-link {
            color: var(--vscode-text) !important;
            opacity: 0.8;
            transition: all 0.2s;
        }

        .nav-link:hover {
            opacity: 1;
            background-color: var(--vscode-highlight);
        }

        .footer {
            background-color: var(--vscode-darker);
            border-top: 1px solid var(--vscode-border);
            padding: 1rem 0;
        }

        .btn-primary {
            background-color: var(--vscode-accent);
            border-color: var(--vscode-accent);
        }

        .btn-primary:hover {
            background-color: #0062a3;
            border-color: #0062a3;
        }

        .lead {
            color: #a0a0a0;
        }

        .display-4 {
            color: var(--vscode-text);
        }

        .text-muted {
            color: #858585 !important;
        }

        /* Add subtle hover effect to buttons */
        .btn {
            transition: all 0.2s;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .welcome-section {
            padding: 3rem 0;
        }

        .team-section {
            padding-top: 0;
        }

        .anonymous-avatar {
            width: 48px;
            height: 48px;
            margin: 0 auto;
        }
    </style>
</head>

<body class="d-flex flex-column h-100">
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="#">{settings.APP_NAME} API</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link rounded px-3" href="/docs" target="_blank">
                            <span class="d-flex align-items-center">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                                    class="bi bi-file-text me-2" viewBox="0 0 16 16">
                                    <path
                                        d="M5 4a.5.5 0 0 0 0 1h6a.5.5 0 0 0 0-1H5zm-.5 2.5A.5.5 0 0 1 5 6h6a.5.5 0 0 1 0 1H5a.5.5 0 0 1-.5-.5zM5 8a.5.5 0 0 0 0 1h6a.5.5 0 0 0 0-1H5zm0 2a.5.5 0 0 0 0 1h3a.5.5 0 0 0 0-1H5z" />
                                    <path
                                        d="M2 2a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V2zm10-1H4a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1z" />
                                </svg>
                                API Documentation
                            </span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link rounded px-3" href="/admin/" target="_blank">
                            <span class="d-flex align-items-center">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                                    class="bi bi-file-text me-2" viewBox="0 0 16 16">
                                    <path
                                        d="M5 4a.5.5 0 0 0 0 1h6a.5.5 0 0 0 0-1H5zm-.5 2.5A.5.5 0 0 1 5 6h6a.5.5 0 0 1 0 1H5a.5.5 0 0 1-.5-.5zM5 8a.5.5 0 0 0 0 1h6a.5.5 0 0 0 0-1H5zm0 2a.5.5 0 0 0 0 1h3a.5.5 0 0 0 0-1H5z" />
                                    <path
                                        d="M2 2a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V2zm10-1H4a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1z" />
                                </svg>
                                Admin panel
                            </span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="flex-shrink-0">
        <div class="container welcome-section">
            <div class="row justify-content-center">
                <div class="col-md-8 text-center mt-5">
                    <h1 class="display-4 mb-4">Welcome to {settings.APP_NAME} API</h1>
                    <p class="lead mb-4">This is backend for {settings.APP_NAME}.</p>
                    <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
                        <a href="/docs" class="btn btn-primary btn-lg px-4 gap-3">
                            View API Documentation
                        </a>
                        <a href="/admin" class="btn btn-primary btn-lg px-4 gap-3">
                            View Admin panel
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div class="container team-section py-5">
            <div class="row justify-content-center g-2">
                <div class="col-md-12 text-center">
                    <h2 class="h2 mb-4">About the team</h2>
                </div>
                <div class="col-md-3">
                    <div class="card bg-transparent">
                        <div class="card-body text-center"
                            style="border: 1px solid var(--vscode-border); border-radius: 8px; background-color: var(--vscode-lighter);">
                            <svg class="anonymous-avatar mb-3" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 11C14.2091 11 16 9.20914 16 7C16 4.79086 14.2091 3 12 3C9.79086 3 8 4.79086 8 7C8 9.20914 9.79086 11 12 11Z" fill="#007acc"/>
                                <path d="M12 12C7.58172 12 4 15.5817 4 20C4 20.5523 4.44772 21 5 21H19C19.5523 21 20 20.5523 20 20C20 15.5817 16.4183 12 12 12Z" fill="#007acc"/>
                            </svg>
                            <h3 class="text-muted h4 mb-3">Владимир</h3>
                            <p class="text-muted mb-3">Backend developer</p>
                        </div>
                    </div>
                </div>

    <footer class="footer mt-auto">
        <div class="container">
            <div class="text-center">
                <p class="mb-0 text-muted"> 2025 API. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- Bootstrap 5 JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
